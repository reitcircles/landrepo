<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Estate - Powered Master Plan (Light)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f1f5f9; font-family: sans-serif; }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }
        .controls-hint {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 40px;
            color: #1e293b;
            font-size: 13px;
            pointer-events: none;
            border: 1px solid rgba(0,0,0,0.1);
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1 class="text-slate-900 text-2xl font-bold tracking-tighter uppercase">Estate Master Plan v3.0</h1>
        <p class="text-slate-600 text-sm font-medium">Internal Perimeter Tree Cover • Waterside Poultry Integration</p>
        <div class="mt-4 flex gap-2">
            <span class="bg-green-100 text-green-700 border border-green-200 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider">Internal Forestry</span>
            <span class="bg-amber-100 text-amber-700 border border-amber-200 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider">Pond Bank Positioned</span>
        </div>
    </div>

    <div class="controls-hint">
        <span class="opacity-60">DRAG LEFT CLICK:</span> <b>Rotate</b> &nbsp;&nbsp; 
        <span class="opacity-60">SCROLL:</span> <b>Zoom</b> &nbsp;&nbsp;
        <span class="opacity-60">DRAG RIGHT CLICK:</span> <b>Pan</b>
    </div>

    <script>
        let scene, camera, renderer;
        let rotationY = 0.5;
        let rotationX = 0.6;
        let distance = 400;
        let target = new THREE.Vector3(0, 0, 0);
        let waterMaterial;

        // Pond boundaries: Center 75, 60 | Size 150x80
        // X: 0 to 150 | Z: 20 to 100
        const POND_X_MIN = 0, POND_X_MAX = 150;
        const POND_Z_MIN = 20, POND_Z_MAX = 100;

        window.onload = function() {
            init();
            animate();
        };

        function createLabel(text, color = '#1e293b') {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.roundRect(0, 0, 512, 128, 20);
            ctx.fill();
            ctx.font = 'bold 44px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = color;
            ctx.fillText(text, 256, 64);
            const texture = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
            sprite.scale.set(35, 8.75, 1);
            sprite.position.y = 28;
            return sprite;
        }

        function isPointInPond(x, z) {
            // Buffer to prevent items being right on the edge
            return x >= POND_X_MIN - 2 && x <= POND_X_MAX + 2 && z >= POND_Z_MIN - 2 && z <= POND_Z_MAX + 2;
        }

        function createTree(x, z) {
            if (isPointInPond(x, z)) return null;

            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 5), new THREE.MeshStandardMaterial({ color: 0x3d2b1f }));
            trunk.position.y = 2.5; group.add(trunk);
            const colors = [0x166534, 0x15803d, 0x14532d, 0x064e3b];
            const randColor = colors[Math.floor(Math.random() * colors.length)];
            for(let i = 0; i < 3; i++) {
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(3.5 - i, 7, 8), new THREE.MeshStandardMaterial({ color: randColor }));
                leaves.position.y = 7 + (i * 2.5);
                leaves.castShadow = true;
                group.add(leaves);
            }
            group.position.set(x, 0, z);
            const s = 0.5 + Math.random() * 0.7;
            group.scale.set(s, s, s);
            return group;
        }

        function addTreeSafely(x, z) {
            const tree = createTree(x, z);
            if (tree) scene.add(tree);
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf1f5f9);
            scene.fog = new THREE.Fog(0xf1f5f9, 400, 2000);

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 3000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(150, 250, 100);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            scene.add(sun);

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(320, 240),
                new THREE.MeshStandardMaterial({ color: 0x16a34a })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Perimeter Walls
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8 });
            const wH = 12; 
            const wT = 2;  

            const nW = new THREE.Mesh(new THREE.BoxGeometry(300, wH, wT), wallMat);
            nW.position.set(0, wH/2, -110);
            scene.add(nW);
            const sW = new THREE.Mesh(new THREE.BoxGeometry(300, wH, wT), wallMat);
            sW.position.set(0, wH/2, 110);
            scene.add(sW);
            const eW_m = new THREE.Mesh(new THREE.BoxGeometry(wT, wH, 220), wallMat);
            eW_m.position.set(150, wH/2, 0);
            scene.add(eW_m);

            const westWallBot = new THREE.Mesh(new THREE.BoxGeometry(wT, wH, 95), wallMat);
            westWallBot.position.set(-150, wH/2, 62.5);
            scene.add(westWallBot);
            const westWallTop = new THREE.Mesh(new THREE.BoxGeometry(wT, wH, 95), wallMat);
            westWallTop.position.set(-150, wH/2, -62.5);
            scene.add(westWallTop);

            const gate = new THREE.Mesh(new THREE.BoxGeometry(1, 8, 30), new THREE.MeshStandardMaterial({ color: 0x2563eb, metalness: 0.5 }));
            gate.position.set(-150, 4, 0);
            scene.add(gate);

            // INTERNAL PERIMETER TREES
            for(let i = -140; i <= 140; i += 12) {
                addTreeSafely(i, -98);
                addTreeSafely(i, 98);
                addTreeSafely(i + 6, -88); 
                addTreeSafely(i + 6, 88);
            }
            for(let j = -85; j <= 85; j += 12) {
                addTreeSafely(138, j);
                addTreeSafely(126, j + 6);
            }
            for(let j = -100; j <= 100; j += 12) {
                if (Math.abs(j) > 20) {
                    addTreeSafely(-138, j);
                    if (j > 0 || j < -100) {
                        addTreeSafely(-126, j + 6);
                    }
                }
            }

            // Road Network
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x475569 });
            const roadIn = new THREE.Mesh(new THREE.PlaneGeometry(50, 12), roadMat);
            roadIn.rotation.x = -Math.PI / 2; roadIn.position.set(-125, 0.05, 0); scene.add(roadIn);

            const mainSpine = new THREE.Mesh(new THREE.PlaneGeometry(150, 10), roadMat);
            mainSpine.rotation.x = -Math.PI / 2; mainSpine.position.set(-25, 0.04, 0); scene.add(mainSpine);

            const junctionRight = new THREE.Mesh(new THREE.PlaneGeometry(10, 160), roadMat);
            junctionRight.rotation.x = -Math.PI / 2; junctionRight.position.set(50, 0.03, 0); scene.add(junctionRight);

            // Main Residence
            const villa = new THREE.Group();
            const b = new THREE.Mesh(new THREE.BoxGeometry(50, 22, 40), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            b.position.y = 11; b.castShadow = true; villa.add(b);
            const r = new THREE.Mesh(new THREE.BoxGeometry(54, 3, 44), new THREE.MeshStandardMaterial({ color: 0x1e3a8a }));
            r.position.y = 22; villa.add(r);
            villa.add(createLabel("MAIN RESIDENCE"));
            villa.position.set(-100, 0, -60);
            scene.add(villa);

            // AGRI-TECH HUB + MINING RIGS
            const tech = new THREE.Group();
            const glass = new THREE.Mesh(new THREE.BoxGeometry(150, 20, 70), new THREE.MeshStandardMaterial({ color: 0xbae6fd, transparent: true, opacity: 0.4 }));
            glass.position.y = 10; tech.add(glass);
            
            for(let sx = -70; sx <= 0; sx += 14) {
                for(let sz = -30; sz <= 30; sz += 12) {
                    const panel = new THREE.Mesh(new THREE.BoxGeometry(11, 0.5, 9), new THREE.MeshStandardMaterial({ color: 0x1e293b, metalness: 0.9 }));
                    panel.position.set(sx, 21, sz);
                    panel.rotation.x = -0.2;
                    tech.add(panel);
                }
            }

            const rigGroup = new THREE.Group();
            for(let rx = 10; rx <= 65; rx += 12) {
                for(let rz = -25; rz <= 25; rz += 15) {
                    const rig = new THREE.Mesh(new THREE.BoxGeometry(8, 15, 6), new THREE.MeshStandardMaterial({ color: 0x334155 }));
                    rig.position.set(rx, 7.5, rz);
                    rigGroup.add(rig);
                    const light = new THREE.Mesh(new THREE.BoxGeometry(8.1, 1, 0.5), new THREE.MeshBasicMaterial({ color: 0x22c55e }));
                    light.position.set(rx, 12, rz + 2.8);
                    rigGroup.add(light);
                }
            }
            tech.add(rigGroup);
            tech.add(createLabel("SOLAR + MINING HUB", "#2563eb"));
            tech.position.set(75, 0, -60);
            scene.add(tech);

            // CHICKEN SHED (Adjusted: Side of the pond, outside the water)
            const chickenShed = new THREE.Group();
            const shedBase = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 15), new THREE.MeshStandardMaterial({ color: 0x78350f }));
            shedBase.position.y = 5; shedBase.castShadow = true; chickenShed.add(shedBase);
            
            const shedRoof = new THREE.Mesh(new THREE.BoxGeometry(22, 2, 17), new THREE.MeshStandardMaterial({ color: 0x451a03 }));
            shedRoof.position.y = 10.5; shedRoof.rotation.z = 0.1; chickenShed.add(shedRoof);
            
            const fence = new THREE.Mesh(new THREE.BoxGeometry(28, 4, 22), new THREE.MeshStandardMaterial({ color: 0x92400e, wireframe: true }));
            fence.position.y = 2; chickenShed.add(fence);
            
            chickenShed.add(createLabel("POULTRY SHED", "#92400e"));
            // Pond ends at X=0 (West side). Placing it at X=-25 to be clearly "side of" the pond.
            // Still within the southern boundary (Z < 110).
            chickenShed.position.set(-25, 0, 60);
            scene.add(chickenShed);

            // POND (South East)
            const pondGroup = new THREE.Group();
            waterMaterial = new THREE.MeshStandardMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.7, metalness: 0.4 });
            const water = new THREE.Mesh(new THREE.PlaneGeometry(150, 80), waterMaterial);
            water.rotation.x = -Math.PI / 2;
            water.position.y = 0.8;
            pondGroup.add(water);
            const base = new THREE.Mesh(new THREE.BoxGeometry(154, 1.5, 84), new THREE.MeshStandardMaterial({ color: 0xcbd5e1 }));
            base.position.y = 0.4;
            pondGroup.add(base);
            pondGroup.add(createLabel("RECREATIONAL POND", "#0284c7"));
            pondGroup.position.set(75, 0, 60);
            scene.add(pondGroup);

            // Interaction listeners
            window.addEventListener('mousedown', (e) => { if (e.button === 0) isDragging = true; if (e.button === 2) isPanning = true; });
            window.addEventListener('mouseup', () => { isDragging = false; isPanning = false; });
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('wheel', onWheel, { passive: false });
            window.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('resize', onResize);
        }

        let isDragging = false;
        let isPanning = false;
        function onMouseMove(e) {
            if (isDragging) {
                rotationY -= e.movementX * 0.005;
                rotationX += e.movementY * 0.005;
                rotationX = Math.max(0.1, Math.min(Math.PI / 2.1, rotationX));
            }
            if (isPanning) {
                const offset = new THREE.Vector3(-e.movementX * 0.2, 0, -e.movementY * 0.2);
                offset.applyQuaternion(camera.quaternion);
                offset.y = 0;
                target.add(offset);
            }
        }
        function onWheel(e) { e.preventDefault(); distance = Math.max(100, Math.min(1000, distance + e.deltaY * 0.2)); }
        function onResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

        function animate() {
            requestAnimationFrame(animate);
            if (waterMaterial) waterMaterial.opacity = 0.6 + Math.sin(Date.now() * 0.001) * 0.05;
            camera.position.x = target.x + distance * Math.sin(rotationY) * Math.cos(rotationX);
            camera.position.z = target.z + distance * Math.cos(rotationY) * Math.cos(rotationX);
            camera.position.y = target.y + distance * Math.sin(rotationX);
            camera.lookAt(target);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
